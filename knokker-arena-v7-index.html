<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Knokker Arena</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,sans-serif;color:white;touch-action:none;overscroll-behavior:none}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#1f8f4d;touch-action:none}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
resize();addEventListener("resize",resize);

const screen=()=>({w:innerWidth,h:innerHeight});
const world={w:2400,h:1800}; // kleinere map
const keys={};
let camera={x:0,y:0},mode="menu",score=0,wave=1,resultText="",autoAimShootTimer=0,superArmed=false;
let menuTab="home";

const brawlers={
  bruiser:{name:"Blauwe Knokker",price:0,desc:"3 kogels breed",color:"#1456d9",head:"#ffd6a5",attack:"spread"},
  ranger:{name:"Ranger",price:250,desc:"1 snelle lange kogel",color:"#16a085",head:"#ffe0bd",attack:"sniper"},
  pyro:{name:"Pyro",price:500,desc:"5 korte vuurkogels",color:"#e67e22",head:"#ffd6a5",attack:"burst"}
};
const skins={
  blue:{name:"Classic Blue",price:0,body:"#1456d9",head:"#ffd6a5"},
  red:{name:"Red Rage",price:150,body:"#d63031",head:"#ffd6a5"},
  gold:{name:"Gold Star",price:350,body:"#f1c40f",head:"#ffeaa7"},
  shadow:{name:"Shadow",price:600,body:"#2d3436",head:"#b2bec3"}
};

let save={
  coins:0,
  ownedBrawlers:["bruiser"],
  ownedSkins:["blue"],
  selectedBrawler:"bruiser",
  selectedSkin:"blue"
};

try{
  const raw=localStorage.getItem("knokkerArenaSave");
  if(raw) save={...save,...JSON.parse(raw)};
}catch(e){}

function saveGame(){localStorage.setItem("knokkerArenaSave",JSON.stringify(save))}
function currentBrawler(){return brawlers[save.selectedBrawler]||brawlers.bruiser}
function currentSkin(){return skins[save.selectedSkin]||skins.blue}
function addCoins(amount){save.coins+=amount;saveGame()}

const player={
  x:world.w/2,y:world.h/2,r:28,
  hp:15000,maxHp:15000,speed:4.8,damage:500,
  dirX:1,dirY:0,shootCd:0,superHits:0,superReady:false
};

let enemies=[],bullets=[],enemyBullets=[],walls=[],bushes=[],pickups=[],floatingText=[];
const moveJoy={x:105,y:innerHeight-115,r:66,dx:0,dy:0,id:null};
const aimJoy={x:innerWidth-105,y:innerHeight-115,r:66,dx:0,dy:0,id:null,active:false};
const superBtn={x:innerWidth-105,y:innerHeight-255,r:48};

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function distance(a,b,c,d){return Math.hypot(a-c,b-d)}
function angleTo(ax,ay,bx,by){return Math.atan2(by-ay,bx-ax)}
function rectCircle(rect,cx,cy,cr){let nx=clamp(cx,rect.x,rect.x+rect.w),ny=clamp(cy,rect.y,rect.y+rect.h);return distance(cx,cy,nx,ny)<cr}
function hitsWall(x,y,r){return walls.some(w=>rectCircle(w,x,y,r))}
function moveObj(o,dx,dy){o.x+=dx;if(o.x<o.r||o.x>world.w-o.r||hitsWall(o.x,o.y,o.r))o.x-=dx;o.y+=dy;if(o.y<o.r||o.y>world.h-o.r||hitsWall(o.x,o.y,o.r))o.y-=dy}
function addFloat(x,y,t,color){floatingText.push({x,y,t,life:38,color})}

function generateMap(){
  // Midden van de map blijft vrij, zodat je nooit vast start.
  walls=[
    {x:260,y:260,w:360,h:75},{x:900,y:250,w:75,h:360},{x:1340,y:270,w:390,h:75},
    {x:1840,y:520,w:75,h:390},{x:320,y:780,w:430,h:75},
    {x:1500,y:1050,w:450,h:75},{x:620,y:1300,w:360,h:75},
    {x:1850,y:1350,w:300,h:75}
  ];
  bushes=[
    {x:120,y:520,w:260,h:150},{x:760,y:120,w:310,h:150},{x:1160,y:520,w:300,h:170},
    {x:1680,y:190,w:270,h:150},{x:2000,y:850,w:250,h:170},{x:240,y:1120,w:300,h:180},
    {x:780,y:920,w:260,h:160},{x:1500,y:1260,w:300,h:170},{x:1780,y:1180,w:270,h:160}
  ];
}

function resetGame(){
  score=0;wave=1;resultText="";
  generateMap();

  // Veilige startpositie, bewust niet op een muur.
  player.x=world.w/2;
  player.y=world.h/2;
  while(hitsWall(player.x,player.y,player.r)){
    player.x+=60;
    player.y+=40;
  }

  player.hp=player.maxHp;player.dirX=1;player.dirY=0;
  player.superHits=0;player.superReady=false;superArmed=false;player.shootCd=0;
  moveJoy.dx=0;moveJoy.dy=0;moveJoy.id=null;
  aimJoy.dx=0;aimJoy.dy=0;aimJoy.id=null;aimJoy.active=false;
  enemies=[];bullets=[];enemyBullets=[];pickups=[];floatingText=[];
  spawnWave(1);mode="game";
}

function spawnEnemy(isBoss=false){
  let x,y;
  do{x=100+Math.random()*(world.w-200);y=100+Math.random()*(world.h-200)}
  while(distance(x,y,player.x,player.y)<500||hitsWall(x,y,isBoss?45:26));
  enemies.push({
    x,y,r:isBoss?48:26,isBoss,
    hp:isBoss?22000:(wave===1?8000:10000),
    maxHp:isBoss?22000:(wave===1?8000:10000),
    speed:isBoss?0.55:(wave===1?0.85:1.05),
    touchDamage:isBoss?450:200,
    bulletDamage:isBoss?450:(wave===1?200:260),
    shootCd:80+Math.random()*100,
    color:isBoss?"#5310a8":"#8b1e1e"
  });
}

function spawnWave(n){
  const amount=n===1?6:9;
  for(let i=0;i<amount;i++)spawnEnemy(false);
  if(n===2)setTimeout(()=>spawnEnemy(true),2200); // af en toe boss, hier in wave 2
}

function inBush(o){return bushes.some(b=>o.x>b.x&&o.x<b.x+b.w&&o.y>b.y&&o.y<b.y+b.h)}

function shootToward(dx,dy,useSuper=false){
  let m=Math.hypot(dx,dy);
  if(m<0.15){dx=player.dirX;dy=player.dirY;m=Math.hypot(dx,dy)||1}
  dx/=m;dy/=m;
  player.dirX=dx;player.dirY=dy;
  const br=currentBrawler();

  function addBullet(angleOffset, radius, speed, damage, life, type){
    const a=Math.atan2(dy,dx)+angleOffset;
    const bx=Math.cos(a), by=Math.sin(a);
    bullets.push({
      x:player.x+bx*36,
      y:player.y+by*36,
      r:radius,
      dx:bx,dy:by,
      speed,damage,life,type
    });
  }

  if(useSuper){
    if(!player.superReady)return;
    player.superReady=false;
    player.superHits=0;
    superArmed=false;

    if(br.attack==="sniper"){
      addBullet(0,26,13,2600,120,"super");
    }else if(br.attack==="pyro"){
      for(let a=-0.55;a<=0.56;a+=0.275)addBullet(a,17,8.8,1200,70,"super");
    }else{
      addBullet(-0.32,18,9.5,1500,95,"super");
      addBullet(-0.16,18,9.5,1500,95,"super");
      addBullet(0,21,9.8,1500,100,"super");
      addBullet(0.16,18,9.5,1500,95,"super");
      addBullet(0.32,18,9.5,1500,95,"super");
    }
    addFloat(player.x,player.y-60,"SUPER!","#ffe45c");
  }else{
    if(player.shootCd>0)return;
    if(br.attack==="sniper"){
      player.shootCd=20;
      addBullet(0,11,14,900,105,"normal");
    }else if(br.attack==="pyro"){
      player.shootCd=18;
      for(let a=-0.38;a<=0.39;a+=0.19)addBullet(a,9,8.5,300,45,"normal");
    }else{
      player.shootCd=13;
      addBullet(-0.20,10,11,500,75,"normal");
      addBullet(0,12,11.4,500,78,"normal");
      addBullet(0.20,10,11,500,75,"normal");
    }
  }
}
function enemyShoot(e){
  let a=angleTo(e.x,e.y,player.x,player.y);
  enemyBullets.push({x:e.x+Math.cos(a)*(e.r+8),y:e.y+Math.sin(a)*(e.r+8),r:e.isBoss?12:7,dx:Math.cos(a),dy:Math.sin(a),speed:e.isBoss?3.8:4.4,damage:e.bulletDamage,life:150});
}

function update(){
  if(mode!=="game")return;
  const s=screen();
  moveJoy.y=s.h-115;aimJoy.x=s.w-105;aimJoy.y=s.h-115;superBtn.x=s.w-105;superBtn.y=s.h-255;
  if(player.shootCd>0)player.shootCd--;

  let mx=moveJoy.dx,my=moveJoy.dy;
  if(keys.w||keys.ArrowUp)my-=1;if(keys.s||keys.ArrowDown)my+=1;if(keys.a||keys.ArrowLeft)mx-=1;if(keys.d||keys.ArrowRight)mx+=1;
  let m=Math.hypot(mx,my);
  if(m>0){mx/=m;my/=m;player.dirX=mx;player.dirY=my;moveObj(player,mx*player.speed,my*player.speed)}
  if(keys[" "])shootToward(player.dirX,player.dirY,false);
  if(keys.e)shootToward(player.dirX,player.dirY,true);

  // Schieten gebeurt wanneer je de rechter joystick loslaat.
  // Daardoor gaat het shot exact waar je richt, niet automatisch omhoog.
  autoAimShootTimer=0;

  for(const b of bullets){b.x+=b.dx*b.speed;b.y+=b.dy*b.speed;b.life--}
  for(const b of enemyBullets){b.x+=b.dx*b.speed;b.y+=b.dy*b.speed;b.life--}
  bullets=bullets.filter(b=>b.life>0&&b.x>0&&b.y>0&&b.x<world.w&&b.y<world.h&&!hitsWall(b.x,b.y,b.r));
  enemyBullets=enemyBullets.filter(b=>b.life>0&&b.x>0&&b.y>0&&b.x<world.w&&b.y<world.h&&!hitsWall(b.x,b.y,b.r));

  for(const e of enemies){
    let d=distance(e.x,e.y,player.x,player.y),a=angleTo(e.x,e.y,player.x,player.y);
    if(d<750){moveObj(e,Math.cos(a)*e.speed,Math.sin(a)*e.speed);e.shootCd--;if(e.shootCd<=0&&d<650){enemyShoot(e);e.shootCd=e.isBoss?75:120+Math.random()*80}}
    if(d<e.r+player.r){player.hp-=e.touchDamage;moveObj(player,Math.cos(a)*18,Math.sin(a)*18);addFloat(player.x,player.y-45,"-"+e.touchDamage,"#ff5b5b")}
  }

  for(let i=enemies.length-1;i>=0;i--){
    for(let j=bullets.length-1;j>=0;j--){
      let e=enemies[i],b=bullets[j];
      if(distance(e.x,e.y,b.x,b.y)<e.r+b.r){
        e.hp-=b.damage; addFloat(e.x,e.y-35,b.type==="super"?"-1500":"-500",b.type==="super"?"#ffe45c":"#fff");
        if(b.type==="normal"){player.superHits++;if(player.superHits>=5){player.superHits=5;player.superReady=true;addFloat(player.x,player.y-70,"SUPER KLAAR","#ffe45c")}}
        bullets.splice(j,1);
        if(e.hp<=0){if(Math.random()<0.25)pickups.push({x:e.x,y:e.y,r:16});enemies.splice(i,1);score++}
        break;
      }
    }
  }

  for(let i=enemyBullets.length-1;i>=0;i--){
    let b=enemyBullets[i];
    if(distance(player.x,player.y,b.x,b.y)<player.r+b.r){player.hp-=b.damage;addFloat(player.x,player.y-45,"-"+b.damage,"#ff5b5b");enemyBullets.splice(i,1)}
  }
  for(let i=pickups.length-1;i>=0;i--){let p=pickups[i];if(distance(player.x,player.y,p.x,p.y)<player.r+p.r){player.hp=Math.min(player.maxHp,player.hp+1800);addFloat(player.x,player.y-50,"+1800","#65ff83");pickups.splice(i,1)}}
  for(const f of floatingText){f.y-=.7;f.life--}floatingText=floatingText.filter(f=>f.life>0);

  if(enemies.length===0){
    if(wave===1){wave=2;spawnWave(2);addFloat(player.x,player.y-80,"WAVE 2","#ffe45c")}
    else{
      const earned=80+score*12;
      addCoins(earned);
      resultText="Gewonnen! +"+earned+" coins";
      mode="menu";
    }
  }
  if(player.hp<=0){
    const earned=Math.max(15,score*8);
    addCoins(earned);
    resultText="Verloren! +"+earned+" coins";
    mode="menu";
  }

  camera.x=clamp(player.x-s.w/2,0,Math.max(0,world.w-s.w));
  camera.y=clamp(player.y-s.h/2,0,Math.max(0,world.h-s.h));
}

function hpBar(x,y,w,h,hp,max){
  ctx.fillStyle="rgba(0,0,0,.65)";ctx.fillRect(x,y,w,h);
  ctx.fillStyle=hp/max>.35?"#26e65a":"#ff4646";ctx.fillRect(x,y,w*(hp/max),h);
  ctx.strokeStyle="#111";ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill()}

function drawPlayer(px,py,scale=1,alpha=1){
  const sk=currentSkin();
  const br=currentBrawler();
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(px,py);ctx.scale(scale,scale);

  ctx.fillStyle="rgba(0,0,0,.25)";
  ctx.beginPath();ctx.ellipse(0,30,30,10,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=sk.body;
  ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();

  // armen
  ctx.fillStyle=sk.body;
  ctx.beginPath();ctx.arc(-25,4,10,0,Math.PI*2);ctx.arc(25,4,10,0,Math.PI*2);ctx.fill();

  // hoofd
  ctx.fillStyle=sk.head;
  ctx.beginPath();ctx.arc(0,-22,17,0,Math.PI*2);ctx.fill();

  // haar/helm afhankelijk van knokker
  ctx.fillStyle=br.attack==="pyro"?"#c0392b":(br.attack==="sniper"?"#2c3e50":"#0b2e85");
  ctx.beginPath();ctx.arc(0,-31,15,Math.PI,0);ctx.fill();

  // wapen
  ctx.fillStyle=br.attack==="sniper"?"#111":"#0b2e85";
  ctx.beginPath();ctx.roundRect(player.dirX*20-8,player.dirY*20-5,24,10,5);ctx.fill();

  ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(-6,-24,3,0,Math.PI*2);ctx.arc(6,-24,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#111";ctx.beginPath();ctx.arc(-6,-24,1.5,0,Math.PI*2);ctx.arc(6,-24,1.5,0,Math.PI*2);ctx.fill();

  ctx.restore();
}
function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);
  ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=e.isBoss?"#ffcc00":"#2f0";ctx.beginPath();ctx.arc(-e.r*.35,-e.r*.25,e.r*.13,0,Math.PI*2);ctx.arc(e.r*.35,-e.r*.25,e.r*.13,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#111";ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,e.r*.18,e.r*.28,0,Math.PI);ctx.stroke();
  ctx.fillStyle="#5b0d0d";ctx.beginPath();ctx.arc(-e.r*.85,0,e.r*.22,0,Math.PI*2);ctx.arc(e.r*.85,0,e.r*.22,0,Math.PI*2);ctx.fill();
  ctx.restore();
  hpBar(e.x-e.r*1.25,e.y-e.r-24,e.r*2.5,9,e.hp,e.maxHp);
  ctx.fillStyle="#fff";ctx.font="bold 10px Arial";ctx.textAlign="center";ctx.fillText(Math.max(0,Math.round(e.hp)),e.x,e.y-e.r-28);
}

function drawGame(){
  const s=screen();
  ctx.clearRect(0,0,s.w,s.h);
  ctx.save();ctx.translate(-camera.x,-camera.y);

  ctx.fillStyle="#2ba84f";ctx.fillRect(0,0,world.w,world.h);
  ctx.strokeStyle="rgba(255,255,255,.08)";
  for(let x=0;x<world.w;x+=120){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,world.h);ctx.stroke()}
  for(let y=0;y<world.h;y+=120){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(world.w,y);ctx.stroke()}

  ctx.fillStyle="#1f8037";for(const b of bushes)rr(b.x,b.y,b.w,b.h,35);
  ctx.fillStyle="#8b6b37";for(const w of walls)rr(w.x,w.y,w.w,w.h,12);

  for(const p of pickups){ctx.fillStyle="#4cff6d";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 18px Arial";ctx.textAlign="center";ctx.fillText("+",p.x,p.y+7)}
  for(const b of bullets){
    ctx.fillStyle=b.type==="super"?"#ffe45c":"#ffd23f";
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    if(b.type==="super"){ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke()}
  }
  ctx.fillStyle="#bd42ff";for(const b of enemyBullets){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()}

  for(const e of enemies)drawEnemy(e);

  drawPlayer(player.x,player.y,1,inBush(player)?.5:1);
  hpBar(player.x-52,player.y-64,104,11,player.hp,player.maxHp);
  ctx.fillStyle="#fff";ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.fillText(Math.max(0,Math.round(player.hp)),player.x,player.y-69);

  for(const f of floatingText){ctx.globalAlpha=Math.max(0,f.life/38);ctx.fillStyle=f.color;ctx.font="bold 18px Arial";ctx.textAlign="center";ctx.fillText(f.t,f.x,f.y);ctx.globalAlpha=1}
  ctx.restore();

  // UI
  ctx.fillStyle="rgba(0,0,0,.45)";ctx.beginPath();ctx.roundRect(12,12,210,104,14);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 15px Arial";ctx.textAlign="left";
  ctx.fillText("❤️ "+Math.max(0,Math.round(player.hp))+" / 15000",24,36);
  ctx.fillText("🌊 Wave: "+wave+" / 2",24,59);
  ctx.fillText("🧟 Vijanden: "+enemies.length,24,82);
  ctx.fillText("⚡ Super: "+(superArmed?"GERICHT":(player.superReady?"KLAAR":player.superHits+"/5")),24,105);

  // controls
  ctx.fillStyle="rgba(0,0,0,.28)";ctx.beginPath();ctx.arc(moveJoy.x,moveJoy.y,moveJoy.r+8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.22)";ctx.beginPath();ctx.arc(moveJoy.x,moveJoy.y,moveJoy.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.9)";ctx.beginPath();ctx.arc(moveJoy.x+moveJoy.dx*42,moveJoy.y+moveJoy.dy*42,25,0,Math.PI*2);ctx.fill();

  ctx.fillStyle="rgba(255,55,55,.25)";ctx.beginPath();ctx.arc(aimJoy.x,aimJoy.y,aimJoy.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.9)";ctx.beginPath();ctx.arc(aimJoy.x+aimJoy.dx*42,aimJoy.y+aimJoy.dy*42,24,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.fillText("AIM",aimJoy.x,aimJoy.y+88);

  if(aimJoy.active){
    let px=player.x-camera.x,py=player.y-camera.y;
    let len=Math.hypot(aimJoy.dx,aimJoy.dy)||1;
    let dx=aimJoy.dx/len,dy=aimJoy.dy/len;
    let range=230;
    let width=superArmed?135:(player.superReady?95:75);
    let endX=px+dx*range,endY=py+dy*range;
    let sideX=-dy*width,sideY=dx*width;

    ctx.fillStyle=superArmed?"rgba(255,220,40,.38)":(player.superReady?"rgba(255,220,40,.22)":"rgba(255,255,255,.23)");
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(endX+sideX,endY+sideY);
    ctx.lineTo(endX-sideX,endY-sideY);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle=superArmed?"rgba(255,220,40,.95)":"rgba(255,255,255,.65)";
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(endX,endY);
    ctx.stroke();
  }

  ctx.fillStyle=superArmed?"rgba(255,140,0,.98)":(player.superReady?"rgba(255,220,40,.95)":"rgba(120,120,120,.55)");
  ctx.beginPath();ctx.arc(superBtn.x,superBtn.y,superBtn.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=4;ctx.stroke();
  ctx.fillStyle=player.superReady?"#111":"#eee";ctx.font="bold 14px Arial";ctx.fillText(superArmed?"AIM":"SUPER",superBtn.x,superBtn.y+5);
}

function button(x,y,w,h,text,fill="#ffd23f",txt="#111"){
  ctx.fillStyle=fill;
  ctx.beginPath();ctx.roundRect(x,y,w,h,18);ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,.45)";ctx.lineWidth=4;ctx.stroke();
  ctx.fillStyle=txt;ctx.font="bold 20px Arial";ctx.textAlign="center";ctx.fillText(text,x+w/2,y+h/2+7);
}

function drawCard(x,y,w,h,title,subtitle,owned,selected,price){
  ctx.fillStyle=selected?"rgba(255,220,40,.38)":"rgba(255,255,255,.16)";
  ctx.beginPath();ctx.roundRect(x,y,w,h,18);ctx.fill();
  ctx.strokeStyle=selected?"#ffe45c":"rgba(255,255,255,.25)";
  ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle="#fff";ctx.font="bold 15px Arial";ctx.textAlign="left";ctx.fillText(title,x+14,y+26);
  ctx.font="12px Arial";ctx.fillText(subtitle,x+14,y+47);
  ctx.font="bold 13px Arial";
  ctx.fillStyle=owned?"#65ff83":"#ffe45c";
  ctx.fillText(owned?(selected?"GEKOZEN":"IN BEZIT"):"🪙 "+price,x+14,y+h-16);
}

function drawMenu(){
  const s=screen();
  ctx.clearRect(0,0,s.w,s.h);

  let g=ctx.createLinearGradient(0,0,0,s.h);
  g.addColorStop(0,"#246bff");g.addColorStop(.55,"#7c3cff");g.addColorStop(1,"#19a64a");
  ctx.fillStyle=g;ctx.fillRect(0,0,s.w,s.h);

  ctx.fillStyle="rgba(0,0,0,.30)";
  ctx.beginPath();ctx.roundRect(16,22,s.w-32,s.h-44,26);ctx.fill();

  ctx.fillStyle="#fff";ctx.font="bold 34px Arial";ctx.textAlign="center";ctx.fillText("KNOKKER ARENA",s.w/2,62);

  ctx.fillStyle="rgba(0,0,0,.35)";
  ctx.beginPath();ctx.roundRect(24,80,150,44,16);ctx.fill();
  ctx.fillStyle="#ffe45c";ctx.font="bold 18px Arial";ctx.textAlign="left";ctx.fillText("🪙 "+save.coins,42,108);

  button(s.w-174,80,70,42,"HOME",menuTab==="home"?"#ffe45c":"#ddd");
  button(s.w-96,80,72,42,"SHOP",menuTab==="shop"?"#ffe45c":"#ddd");

  if(resultText){
    ctx.fillStyle="#ffe45c";ctx.font="bold 18px Arial";ctx.textAlign="center";ctx.fillText(resultText,s.w/2,144);
  }

  if(menuTab==="home"){
    drawPlayer(s.w/2,235,2.15,1);
    ctx.fillStyle="#fff";ctx.font="bold 22px Arial";ctx.textAlign="center";
    ctx.fillText(currentBrawler().name,s.w/2,360);
    ctx.font="15px Arial";
    ctx.fillText(currentBrawler().desc+" • Skin: "+currentSkin().name,s.w/2,386);

    button(s.w/2-120,s.h-145,240,68,"SPELEN","#ffd23f");
    ctx.fillStyle="rgba(255,255,255,.9)";ctx.font="14px Arial";
    ctx.fillText("Win coins, koop skins en nieuwe knokkers.",s.w/2,s.h-48);
  }else{
    ctx.fillStyle="#fff";ctx.font="bold 20px Arial";ctx.textAlign="left";
    ctx.fillText("Knokkers",32,160);

    let y=176,cardW=s.w-64;
    let ids=Object.keys(brawlers);
    for(let i=0;i<ids.length;i++){
      const id=ids[i],b=brawlers[id];
      const owned=save.ownedBrawlers.includes(id),selected=save.selectedBrawler===id;
      drawCard(32,y+i*86,cardW,72,b.name,b.desc,owned,selected,b.price);
    }

    let sy=y+ids.length*86+26;
    ctx.fillStyle="#fff";ctx.font="bold 20px Arial";ctx.textAlign="left";
    ctx.fillText("Skins",32,sy);

    const skinIds=Object.keys(skins);
    const colW=(s.w-76)/2;
    for(let i=0;i<skinIds.length;i++){
      const id=skinIds[i],sk=skins[id];
      const x=32+(i%2)*(colW+12), yy=sy+18+Math.floor(i/2)*82;
      const owned=save.ownedSkins.includes(id),selected=save.selectedSkin===id;
      drawCard(x,yy,colW,68,sk.name,"kleur skin",owned,selected,sk.price);
      ctx.fillStyle=sk.body;ctx.beginPath();ctx.arc(x+colW-28,yy+34,16,0,Math.PI*2);ctx.fill();
    }
  }
}
function draw(){mode==="menu"?drawMenu():drawGame()}
function loop(){update();draw();requestAnimationFrame(loop)}
generateMap();loop();

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);
function touchPoint(t){return{x:t.clientX,y:t.clientY}}

function menuClick(x,y){
  const s=screen();

  if(y>80&&y<122&&x>s.w-174&&x<s.w-104){menuTab="home";return}
  if(y>80&&y<122&&x>s.w-96&&x<s.w-24){menuTab="shop";return}

  if(menuTab==="home"){
    const bx=s.w/2-120,by=s.h-145,bw=240,bh=68;
    if(x>bx&&x<bx+bw&&y>by&&y<by+bh)resetGame();
    return;
  }

  // shop clicks: brawlers
  let y0=176,cardW=s.w-64;
  const ids=Object.keys(brawlers);
  for(let i=0;i<ids.length;i++){
    const id=ids[i],b=brawlers[id];
    const cy=y0+i*86;
    if(x>32&&x<32+cardW&&y>cy&&y<cy+72){
      if(save.ownedBrawlers.includes(id)){
        save.selectedBrawler=id;
        resultText="Knokker gekozen: "+b.name;
      }else if(save.coins>=b.price){
        save.coins-=b.price;
        save.ownedBrawlers.push(id);
        save.selectedBrawler=id;
        resultText="Gekocht: "+b.name;
      }else{
        resultText="Niet genoeg coins";
      }
      saveGame();
      return;
    }
  }

  // shop clicks: skins
  let sy=y0+ids.length*86+26;
  const skinIds=Object.keys(skins);
  const colW=(s.w-76)/2;
  for(let i=0;i<skinIds.length;i++){
    const id=skinIds[i],sk=skins[id];
    const cx=32+(i%2)*(colW+12), cy=sy+18+Math.floor(i/2)*82;
    if(x>cx&&x<cx+colW&&y>cy&&y<cy+68){
      if(save.ownedSkins.includes(id)){
        save.selectedSkin=id;
        resultText="Skin gekozen: "+sk.name;
      }else if(save.coins>=sk.price){
        save.coins-=sk.price;
        save.ownedSkins.push(id);
        save.selectedSkin=id;
        resultText="Gekocht: "+sk.name;
      }else{
        resultText="Niet genoeg coins";
      }
      saveGame();
      return;
    }
  }
}

addEventListener("touchstart",e=>{
  for(const t of e.changedTouches){
    const p=touchPoint(t);

    if(mode==="menu"){
      menuClick(p.x,p.y);
      continue;
    }

    if(distance(p.x,p.y,moveJoy.x,moveJoy.y)<moveJoy.r+65&&moveJoy.id===null){
      moveJoy.id=t.identifier;
      let dx=p.x-moveJoy.x,dy=p.y-moveJoy.y,d=Math.hypot(dx,dy)||1;
      if(d>moveJoy.r){dx=dx/d*moveJoy.r;dy=dy/d*moveJoy.r}
      moveJoy.dx=dx/moveJoy.r;moveJoy.dy=dy/moveJoy.r;
    }

    if(distance(p.x,p.y,aimJoy.x,aimJoy.y)<aimJoy.r+75&&aimJoy.id===null){
      aimJoy.id=t.identifier;
      aimJoy.active=true;
      let dx=p.x-aimJoy.x,dy=p.y-aimJoy.y,d=Math.hypot(dx,dy)||1;
      if(d>aimJoy.r){dx=dx/d*aimJoy.r;dy=dy/d*aimJoy.r}
      aimJoy.dx=dx/aimJoy.r;aimJoy.dy=dy/aimJoy.r;
      if(Math.hypot(aimJoy.dx,aimJoy.dy)>.15){player.dirX=aimJoy.dx;player.dirY=aimJoy.dy}
    }

    if(distance(p.x,p.y,superBtn.x,superBtn.y)<superBtn.r+35){
      if(player.superReady){
        superArmed=true;
        addFloat(player.x,player.y-70,"RICHT JE SUPER","#ffe45c");
      }
    }
  }
  e.preventDefault();
},{passive:false});

addEventListener("touchmove",e=>{
  if(mode!=="game")return;
  for(const t of e.changedTouches){
    const p=touchPoint(t);
    if(t.identifier===moveJoy.id){
      let dx=p.x-moveJoy.x,dy=p.y-moveJoy.y,d=Math.hypot(dx,dy)||1;if(d>moveJoy.r){dx=dx/d*moveJoy.r;dy=dy/d*moveJoy.r}
      moveJoy.dx=dx/moveJoy.r;moveJoy.dy=dy/moveJoy.r;
    }
    if(t.identifier===aimJoy.id){
      let dx=p.x-aimJoy.x,dy=p.y-aimJoy.y,d=Math.hypot(dx,dy)||1;if(d>aimJoy.r){dx=dx/d*aimJoy.r;dy=dy/d*aimJoy.r}
      aimJoy.dx=dx/aimJoy.r;aimJoy.dy=dy/aimJoy.r;if(Math.hypot(aimJoy.dx,aimJoy.dy)>.15){player.dirX=aimJoy.dx;player.dirY=aimJoy.dy}
    }
  }
  e.preventDefault();
},{passive:false});

addEventListener("touchend",e=>{
  if(mode!=="game")return;
  for(const t of e.changedTouches){
    if(t.identifier===moveJoy.id){moveJoy.id=null;moveJoy.dx=0;moveJoy.dy=0}
    if(t.identifier===aimJoy.id){
      if(Math.hypot(aimJoy.dx,aimJoy.dy)>.15)shootToward(aimJoy.dx,aimJoy.dy,superArmed);
      aimJoy.id=null;aimJoy.dx=0;aimJoy.dy=0;aimJoy.active=false;
    }
  }
  e.preventDefault();
},{passive:false});

addEventListener("mousedown",e=>{
  if(mode==="menu")menuClick(e.clientX,e.clientY);
  else if(distance(e.clientX,e.clientY,superBtn.x,superBtn.y)<superBtn.r+35 && player.superReady){
    superArmed=true;
    addFloat(player.x,player.y-70,"RICHT JE SUPER","#ffe45c");
  }
});
</script>
</body>
</html>
